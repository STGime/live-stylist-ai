steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/livestylist/backend'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/livestylist/backend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'livestylist-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/livestylist/backend'
      - '--region=us-central1'
      - '--platform=managed'
      - '--timeout=360'
      - '--session-affinity'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=100'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,REVENUECAT_API_KEY=revenuecat-api-key:latest,EUROBASE_SECRET_KEY=eurobase-secret-key:latest,FAL_AI_KEY=fal-ai-key:latest,TESTER_SECRET=tester-secret:latest'
      # --update-env-vars (not --set-env-vars) so ad-hoc env vars set
      # by operators via `gcloud run services update --update-env-vars=…`
      # (e.g. TESTER_DEVICE_IDS) survive cloudbuild deploys. See #27.
      # TESTER_DEVICE_IDS is intentionally omitted from the list — it's
      # operator-managed at runtime, the code guards on its absence.
      - '--update-env-vars=NODE_ENV=production,EUROBASE_URL=https://livestylist.eurobase.app,MONTHLY_PREMIUM_SESSION_CAP=30,TESTER_MONTHLY_SESSION_CAP=100,GEMINI_MODEL=gemini-2.5-flash-native-audio-latest'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/livestylist/backend'
