server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Static assets — long cache + immutable. Versioned by content (browsers
    # bust on URL change), 30 days is safe.
    location ~* \.(png|jpg|jpeg|gif|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Plain-text crawler files — short cache so updates propagate fast.
    location ~* /(robots\.txt|sitemap\.xml|llms\.txt|llms-full\.txt)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # HTML — 1 hour public cache. Lets a CDN absorb most traffic without
    # delaying content updates by more than an hour.
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve files or return 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Gzip. brotli would be nicer but the stock nginx:alpine image doesn't
    # ship the brotli module; would need a custom Dockerfile build step.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
